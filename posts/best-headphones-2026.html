<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>أفضل 10 سماعات في 2026 — تقنية عُمان</title>
<meta name="description" content="أفضل السماعات اللاسلكية والسلكية في 2026 — مراجعات شاملة مع الأسعار وروابط الشراء">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--bg2:#111118;--bg3:#1a1a24;--card:#16161f;--border:#2a2a3a;--text:#e4e4ef;--text-dim:#9090a8;--text-muted:#6a6a80;--accent:#7c6cf0;--accent-light:#9b8fff;--accent-glow:rgba(124,108,240,0.15);--green:#34d399;--amber:#fbbf24;--radius:12px;--radius-lg:20px;--shadow:0 4px 24px rgba(0,0,0,0.4);--transition:0.3s cubic-bezier(0.4,0,0.2,1)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'IBM Plex Sans Arabic',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.7}
a{text-decoration:none;color:inherit}
.container{max-width:1200px;margin:0 auto;padding:0 24px}
.header{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(10,10,15,0.8);backdrop-filter:blur(16px);border-bottom:1px solid var(--border)}
.header-inner{display:flex;align-items:center;justify-content:space-between;height:64px}
.logo{display:flex;align-items:center;gap:10px;font-size:1.3rem;font-weight:700}
.logo-mark{width:36px;height:36px;background:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;box-shadow:0 2px 12px var(--accent-glow)}
.logo-accent{color:var(--accent-light)}
.nav{display:flex;gap:4px}
.nav a{padding:8px 16px;border-radius:8px;font-size:0.9rem;font-weight:500;color:var(--text-dim);transition:all var(--transition)}
.nav a:hover{color:var(--text);background:var(--bg3)}
.menu-btn{display:none;background:none;border:none;color:var(--text);font-size:1.4rem;cursor:pointer}
.page-hero{padding:120px 0 60px;text-align:center}
.breadcrumb{font-size:0.85rem;color:var(--text-muted);margin-bottom:16px}
.breadcrumb a{color:var(--accent-light)}
.page-hero h1{font-size:clamp(1.8rem,4vw,2.8rem);font-weight:700;margin-bottom:8px}
.page-hero p{color:var(--text-dim);font-size:1.05rem}
.product-list{max-width:900px;margin:0 auto;padding:0 24px 80px;display:flex;flex-direction:column;gap:16px}
.p-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);display:flex;overflow:hidden;transition:all var(--transition)}
.p-card:hover{border-color:var(--accent);transform:translateY(-3px);box-shadow:var(--shadow)}
.p-rank{min-width:56px;display:flex;align-items:center;justify-content:center;font-size:1.5rem;font-weight:700;background:var(--bg3);color:var(--accent);flex-shrink:0}
.p-img{width:160px;height:160px;object-fit:cover;flex-shrink:0}
.p-info{flex:1;padding:20px}
.p-cat{font-size:0.75rem;color:var(--accent-light);font-weight:600;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px}
.p-info h3{font-size:1.15rem;font-weight:700;margin-bottom:6px}
.p-desc{color:var(--text-dim);font-size:0.88rem;margin-bottom:10px;line-height:1.6}
.stars{display:flex;gap:2px;align-items:center;margin-bottom:10px}
.star{color:var(--amber);font-size:0.85rem}
.star-o{color:var(--border);font-size:0.85rem}
.rating-val{font-size:0.78rem;color:var(--text-muted);margin-right:6px}
.p-bottom{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.price{font-size:1.15rem;font-weight:700;color:var(--green)}
.price-old{font-size:0.82rem;color:var(--text-muted);text-decoration:line-through;margin-right:6px}
.btn-buy{padding:8px 20px;background:#f59e0b;color:#0a0a0f;border-radius:8px;font-weight:700;font-size:0.82rem;border:none;cursor:pointer;transition:all var(--transition);font-family:inherit}
.btn-buy:hover{background:#fbbf24;transform:translateY(-1px)}
.footer{border-top:1px solid var(--border);padding:40px 0 20px;text-align:center;background:var(--bg2)}
.footer p{color:var(--text-muted);font-size:0.85rem}
@media(max-width:768px){
  .nav{display:none}
  .menu-btn{display:block}
  .nav.open{display:flex;flex-direction:column;position:absolute;top:64px;left:0;right:0;background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 24px;gap:4px}
  .p-card{flex-direction:column}
  .p-rank{min-width:auto;padding:8px}
  .p-img{width:100%;height:180px}
}
</style>
</head>
<body>
<header class="header" id="header"><div class="container"><div class="header-inner">
  <a href="../index.html" class="logo"><div class="logo-mark">⚡</div><span>تقنية <span class="logo-accent">عُمان</span></span></a>
  <nav class="nav" id="nav"><a href="../index.html">الرئيسية</a><a href="../index.html#categories">التصنيفات</a></nav>
  <button class="menu-btn" onclick="toggleNav()">☰</button>
</div></div></header>

<div class="page-hero"><div class="container">
  <div class="breadcrumb"><a href="../index.html">الرئيسية</a> / السماعات</div>
  <h1>🎧 أفضل 10 سماعات في 2026</h1>
  <p>مراجعات شاملة مع الأسعار — محدثة مايو 2026</p>
</div></div>

<div class="product-list" id="list"></div>

<footer class="footer"><div class="container"><p>© 2026 تقنية عُمان | روابط تابعة لبرامج الأفلييت</p></div></footer>

<script>
window.addEventListener('scroll',()=>{document.getElementById('header').classList.toggle('scrolled',window.scrollY>40)});
function toggleNav(){document.getElementById('nav').classList.toggle('open')}
const stars=n=>'★'.repeat(Math.floor(n))+'<span class="star-o">'+'★'.repeat(5-Math.floor(n))+'</span>';
const items=[
  {name:'Sony WH-1000XM5',cat:'أفضل إلغاء ضوضاء',rating:9.2,price:'1,199',old:'1,499',desc:'أفضل سماعات إلغاء ضوضاء في العالم. صوت نقي وبطارية 30 ساعة.',img:'https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=300&h=300&fit=crop&q=70',url:'https://www.amazon.ae/s?k=sony+wh1000xm5&tag=brqoman-21'},
  {name:'AirPods Pro 3',cat:'أفضل سماعات أذن',rating:9.0,price:'949',old:'1,099',desc:'إلغاء ضوضاء متقدم، صوت مكاني، وتكامل سلس مع أبل.',img:'https://images.unsplash.com/photo-1583394838336-acd977736f90?w=300&h=300&fit=crop&q=70',url:'https://www.amazon.ae/s?k=airpods+pro+3&tag=brqoman-21'},
  {name:'Bose QuietComfort Ultra',cat:'الأكثر راحة',rating:8.9,price:'1,099',old:'1,299',desc:'راحة استثنائية مع إلغاء ضوضاء ممتاز. مثالية للسفر.',img:'https://images.unsplash.com/photo-1546435770-a3e426bf472b?w=300&h=300&fit=crop&q=70',url:'https://www.amazon.ae/s?k=bose+quietcomfort+ultra&tag=brqoman-21'},
  {name:'Sennheiser Momentum 4',cat:'أفضل جودة صوت',rating:9.1,price:'1,399',old:null,desc:'صوت استوديو احترافي في سماعة لاسلكية. بطارية 60 ساعة.',img:'https://images.unsplash.com/photo-1484704849700-f032a568e944?w=300&h=300&fit=crop&q=70',url:'https://www.amazon.ae/s?k=sennheiser+momentum+4&tag=brqoman-21'},
  {name:'JBL Tour One M2',cat:'أفضل قيمة',rating:8.5,price:'699',old:'899',desc:'إلغاء ضوضاء جيد بسعر معقول. بطارية 50 ساعة وشحن سريع.',img:'https://images.unsplash.com/photo-1524678606370-a47ad25cb82a?w=300&h=300&fit=crop&q=70',url:'https://www.amazon.ae/s?k=jbl+tour+one+m2&tag=brqoman-21'},
  {name:'Apple AirPods Max 2',cat:'أفضل سماعات أبل',rating:8.7,price:'1,799',old:null,desc:'صوت محيطي مذهل مع بناء من الألومنيوم. مثالية لعالم أبل.',img:'https://images.unsplash.com/photo-1625245488600-f03fef636a3c?w=300&h=300&fit=crop&q=70',url:'https://www.amazon.ae/s?k=airpods+max+2&tag=brqoman-21'},
  {name:'Samsung Galaxy Buds 3 Pro',cat:'أفضل مع سامسونج',rating:8.6,price:'749',old:'899',desc:'تكامل مثالي مع هواتف سامسونج. صوت ممتاز وإلغاء ضوضاء.',img:'https://images.unsplash.com/photo-1590658268037-6bf12165a8df?w=300&h=300&fit=crop&q=70',url:'https://www.amazon.ae/s?k=galaxy+buds+3+pro&tag=brqoman-21'},
  {name:'Sony WF-1000XM5',cat:'أفضل سماعات أذن فاخرة',rating:8.8,price:'1,099',old:'1,299',desc:'أصغر وأخف مع إلغاء ضوضاء ممتاز. صوت Hi-Res.',img:'https://images.unsplash.com/photo-1631867675167-90a456a90863?w=300&h=300&fit=crop&q=70',url:'https://www.amazon.ae/s?k=sony+wf1000xm5&tag=brqoman-21'},
  {name:'Anker Soundcore Space Q45',cat:'أفضل اقتصادي',rating:8.3,price:'349',old:'449',desc:'إلغاء ضوضاء جيد جداً بالسعر. بطارية 50 ساعة.',img:'https://images.unsplash.com/photo-1558756520-22cfe5d382ca?w=300&h=300&fit=crop&q=70',url:'https://www.amazon.ae/s?k=anker+soundcore+space+q45&tag=brqoman-21'},
  {name:'Beats Studio Pro',cat:'أفضل للرياضة',rating:8.4,price:'799',old:null,desc:'تصميم رياضي مع صوت عميق وبطارية 40 ساعة.',img:'https://images.unsplash.com/photo-1577174881658-0f30ed549adc?w=300&h=300&fit=crop&q=70',url:'https://www.amazon.ae/s?k=beats+studio+pro&tag=brqoman-21'},
];
const list=document.getElementById('list');
items.forEach((p,i)=>{
  list.innerHTML+=`<div class="p-card"><div class="p-rank">${i+1}</div><img class="p-img" src="${p.img}" alt="${p.name}" loading="lazy"><div class="p-info"><div class="p-cat">${p.cat}</div><h3>${p.name}</h3><div class="stars">${stars(p.rating)}<span class="rating-val">${p.rating}/10</span></div><p class="p-desc">${p.desc}</p><div class="p-bottom"><div><span class="price">${p.price} ر.ع</span>${p.old?`<span class="price-old">${p.old}</span>`:''}</div><a href="${p.url}" class="btn-buy" target="_blank" rel="nofollow">🛒 أمازون</a></div></div></div>`;
});
</script>
</body>
</html>
